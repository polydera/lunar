name = "lunar"
main = "functions/worker.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "dist"
binding = "ASSETS"
run_worker_first = true

[[durable_objects.bindings]]
name = "MCP_SESSION"
class_name = "LunaMcpSession"

[observability.logs]
enabled = true
invocation_logs = true

[[migrations]]
tag = "v1"
new_sqlite_classes = ["LunaMcpSession"]
